<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maintenance Demand</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f8;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    color: #2c3e50;
    line-height: 1.3;
    margin: 0;
    padding: 0;
}

/* Adaptive container for mobile/tablet/desktop */
.print-container {
    width: 100%;
    max-width: 210mm;
    min-height: 297mm;
    margin: 10px auto;
    padding: 20mm;
    background: white;
    border-radius: 8px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
    position: relative;
    box-sizing: border-box;
    overflow: hidden;
}

/* Print styling - keep margins same */
@media print {
    body { background: white; }
    .no-print { display: none !important; }
    .print-container {
        width: 100%;
        padding: 20mm;
        margin: 0;
        min-height: 100%;
        box-shadow: none;
        page-break-after: avoid;
    }
}

/* Header & Text */
.header { text-align: center; margin-bottom: 1rem; }
.notice { text-align:center; font-weight:bold; margin-bottom:10px; color:#c0392b; font-size: 1rem; }
.section-title { font-weight: 600; margin-top: 10px; margin-bottom: 5px; }
.highlight { font-weight:bold; color:#c0392b; font-size:1.2rem; }

/* Tables */
.table td, .table th { vertical-align: middle; font-size: 0.95rem; }

/* Prevent page break inside table and important divs */
.print-container, .table, h6, p {
    page-break-inside: avoid;
}

/* Responsive adjustments for small screens */
@media (max-width: 768px) {
    .print-container {
        padding: 15px;
    }
    .notice { font-size: 0.9rem; }
    .highlight { font-size: 1rem; }
    .table td, .table th { font-size: 0.85rem; padding: 0.3rem; }
    h4 { font-size: 1.2rem; }
    h5 { font-size: 1rem; }
    h6 { font-size: 0.95rem; }
    .card p { font-size: 0.85rem; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="container mt-4 no-print" id="login"></div>

<!-- CONTENT -->
<div id="app"></div>

<script>

// LOGIN UI
document.getElementById("login").innerHTML = `
<div class="card shadow mx-auto" style="max-width: 400px;">
  <div class="card-body text-center">
    <h4 class="card-title">Alacrity Co-operative Housing Society Ltd.</h4>
    <p class="text-muted">Maintenance Demand Access</p>

    <input class="form-control mb-2" id="flatInput" placeholder="Flat (e.g. A601)">
    <input class="form-control mb-2" id="emailInput" placeholder="Email">

    <button class="btn btn-primary w-100" onclick="validateUser()">View Details</button>
    <div id="error" class="text-danger mt-2"></div>
  </div>
</div>
`;

function validateUser() {
    let f = document.getElementById("flatInput").value.trim().toUpperCase();
    let e = document.getElementById("emailInput").value.trim().toLowerCase();

    fetch("data/maintenance_demand_2026-27.json")
    .then(r => r.json())
    .then(data => {
        let rec = data.find(x =>
            x.flat === f &&
            ((x.email1 && x.email1.toLowerCase() === e) ||
             (x.email2 && x.email2.toLowerCase() === e))
        );

        if (!rec) {
            document.getElementById("error").innerText = "❌ Invalid Flat or Email";
            return;
        }

        document.getElementById("login").style.display = "none";
        render(rec);
    });
}

function render(r) {
    let occupancy = (r.occupancy || "").toLowerCase();
    let isRented = occupancy === "tenant" || occupancy === "rented";
    let receiptNo = `${r.flat}-${'26/27'}`;
    let additional = isRented ? r.additional : 0;
    let status = r.full_payment === true ? "PAID" : r.paid_installment_1 === true ? "PART PAYMENT" : "PENDING";
    let bageColor = status === "PAID" ? "bg-success" : "bg-danger";
    let badge = `<span class="badge ${bageColor}">${status}</span>`;
        // ? `<span class="badge bg-success">${status}</span>`
        // : `<span class="badge ${bageColor}">${status}</span>`;

    let eligible = r.maintenance + additional;
    let discount = (eligible * 0.05).toFixed(2);

    document.getElementById("app").innerHTML = `
<div class="print-container">

  <!-- PRINT BUTTON -->
  <button class="btn btn-secondary btn-sm position-absolute top-0 end-0 m-2 no-print" onclick="window.print()">
    🖨 Print
  </button>

  <!-- HEADER -->
  <div class="header">
    <h4>Alacrity Co-operative Housing Society Ltd.</h4>
    <h5>Maintenance Payment Due (FY 2026-27)</h5>
    <p><b>Demand</b> ${receiptNo}</p>
  </div>

  <p class="notice">PLEASE READ THE NOTICE CAREFULLY</p>

  <div class="row mb-2">
    <div class="col-md-6 col-sm-12">
      <b>Flat:</b> ${r.flat} ${isRented ? `<span class="badge bg-warning text-dark ms-2">RENTED</span>` : ``}
    </div>
    <div class="col-md-6 col-sm-12 text-md-end">
      ${badge}
    </div>
  </div>

  <p>Dear <b>${r.name}</b>,</p>
  <p>You are requested to pay maintenance amounting to <b>₹${r.total_due}</b>.</p>

  <!-- PAYMENT OPTIONS -->
  <h6 class="section-title">Payment Options</h6>
  <div class="row mb-2">
    <div class="col-md-6 col-sm-12 mb-1">
      <div class="card p-2">
        <h6>A) Full Payment (5% Discount)</h6>
        <p class="mb-0"><b>₹${Math.round(r.discounted)}</b> before 30 April 2026</p>
      </div>
    </div>
    <div class="col-md-6 col-sm-12 mb-1">
      <div class="card p-2">
        <h6>B) Installments</h6>
        <p class="mb-0"><b>₹${Math.round(r.inst1)}</b> (30 April 2026)</p>
        <p class="mb-0"><b>₹${Math.round(r.inst2)}</b> (30 October 2026)</p>
      </div>
    </div>
  </div>

  <!-- PAYMENT SUMMARY -->
  <h6 class="section-title">Payment Summary</h6>
  <table class="table table-bordered table-sm mb-2">
    <tbody>
      <tr><td>Maintenance</td><td>₹${Math.round(r.maintenance)}</td></tr>
      ${isRented ? `<tr><td>Additional (Rented Property)</td><td>₹${Math.round(r.additional)}</td></tr>` : ''}
      <tr><td>Eligible Amount for Discount</td><td>₹${Math.round(eligible)}</td></tr>
      <tr><td>5% Discount (Applicable only for Full Payment)</td><td style="color: red;">₹${Math.round(discount)}</td></tr>
      <tr><td>Maintenance (After Discount)</td><td>₹${Math.round(eligible - discount)}</td></tr>
      <tr><td>Previous Balance</td><td>₹${r.previous}</td></tr>
      <tr><td>Sinking Fund</td><td>₹${r.sinking}</td></tr>
      ${r.conveyance > 0 ? `<tr><td>Conveyance Deed Charges (One-time)</td><td>₹${r.conveyance}</td></tr>` : ''}
      <tr class="table-danger"><td><b>Grand Total Payable</b></td><td class="highlight">₹${Math.round(r.discounted)}</td></tr>
    </tbody>
  </table>
  <!-- PAYMENT METHODS -->
<h6 class="section-title">Payment Methods</h6>
<hr/>
<div class="row mb-3" style="font-size: 0.9rem;">

  <div class="col-md-6 col-sm-12 mb-2">
    <div class="p-2 border rounded">
      <b>Account Payee Cheque:</b><br>
      Alacrity Co-operative Housing Society Ltd.<br>
      <b>Submit to:</b> Achyut Oak (Society Manager)<br>
      9:30 AM – 6:30 PM (Except Wednesday)<br>
      <b>Phone:</b> 8208146541
    </div>
  </div>

  <div class="col-md-6 col-sm-12 mb-2">
    <div class="p-2 border rounded">
      <b>NEFT / Online Transfer:</b><br>
      Account No: 9310000100008523<br>
      Bank: Punjab National Bank<br>
      IFSC: PUNB0931000<br><br>
      <b>Email proof to:</b><br>
      alacrityhsgsociety@gmail.com<br>
      alacritymanager94@gmail.com
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer mt-3" style="font-size: 0.95rem;">
  With Regards,<br>
  <b>Alacrity Committee</b>
    <p style="font-size: 0.75rem; color: #555;">
    <b>Note:</b> Payment updates are done on weekends, so expect a delay in status changes (PAID / PART PAYMENT).
  </p>
</div>
`;
}
</script>
</body>
</html>
