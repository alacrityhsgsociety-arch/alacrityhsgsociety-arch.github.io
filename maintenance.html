<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Maintenance Demand</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f4f6f8; }

@page {
    size: A4;
    margin: 20mm;
}

.print-container {
    max-width: 210mm;
    margin: auto;
    background: white;
    padding: 20mm;
}

@media print {
    .no-print { display: none !important; }
    body { background: white; }
    .print-container { margin: 0; padding: 0; }
}

.header { text-align: center; }
.notice { text-align:center; font-weight:bold; margin-bottom:10px; }
.highlight { font-weight:bold; color:#c0392b; font-size:18px; }
</style>
</head>

<body>

<!-- LOGIN -->
<div class="container mt-4 no-print" id="login"></div>

<!-- CONTENT -->
<div id="app"></div>

<script>

// LOGIN UI
document.getElementById("login").innerHTML = `
<div class="card shadow">
<div class="card-body text-center">
    <h4>Alacrity Co-operative Housing Society Ltd.</h4>
    <p class="text-muted">Maintenance Demand Access</p>

    <input class="form-control mb-2" id="flatInput" placeholder="Flat (e.g. A601)">
    <input class="form-control mb-2" id="emailInput" placeholder="Email">

    <button class="btn btn-primary w-100" onclick="validateUser()">View Details</button>
    <div id="error" class="text-danger mt-2"></div>
</div>
</div>
`;

// VALIDATION
function validateUser() {

    let f = document.getElementById("flatInput").value.trim().toUpperCase();
    let e = document.getElementById("emailInput").value.trim().toLowerCase();

    fetch("data/maintenance_demand_2026-27.json")
    .then(r => r.json())
    .then(data => {

        let rec = data.find(x =>
            x.flat === f &&
            ((x.email1 && x.email1.toLowerCase() === e) ||
             (x.email2 && x.email2.toLowerCase() === e))
        );

        if (!rec) {
            document.getElementById("error").innerText = "❌ Invalid Flat or Email";
            return;
        }

        document.getElementById("login").style.display = "none";
        render(rec);
    });
}

// RENDER
function render(r) {

    let occupancy = (r.occupancy || "").toLowerCase();
    let isRented = occupancy === "tenant" || occupancy === "rented";

    let additional = isRented ? r.additional : 0;

    // STATUS
    let status = "pending";
    if (r.paid === true) status = "paid";

    let badge = status === "paid"
        ? `<span class="badge bg-success">PAID</span>`
        : `<span class="badge bg-danger">PENDING</span>`;

    //let eligible = r.maintenance + additional + r.previous;
    let eligible = r.maintenance + additional;

    let discount = (eligible * 0.05).toFixed(2);

    document.getElementById("app").innerHTML = `

<div class="print-container">

<!-- HEADER -->
<div class="header">
    <h4>Alacrity Co-operative Housing Society Ltd.</h4>
    <h5>Maintenance Payment Due (FY 2026-27)</h5>
</div>

<p class="notice">PLEASE READ THE NOTICE CAREFULLY</p>

<div class="d-flex justify-content-between">
    <div>
        <b>Flat:</b> ${r.flat}
        ${isRented ? `<span class="badge bg-warning text-dark ms-2">RENTED</span>` : ``}
    </div>
    <div>${badge}</div>
</div>

<p>Dear <b>${r.name}</b>,</p>

<p>
You are required to pay maintenance of <b>₹${r.total_due}</b></p>
<hr>

<!-- PAYMENT OPTIONS -->
<h5>Payment Options</h5>

<p>
<b>A) Full Payment (5% Discount):</b>
<b>₹${Math.round(r.discounted)}</b> before 30 April 2026
</p>

<p class="text-center"><b>OR</b></p>

<p>
<b>B) Installments:</b><br>
<b>₹${Math.round(r.inst1)}</b> (30 April 2026)<br>
<b>₹${Math.round(r.inst2)}</b> (30 October 2026)
</p>

<hr>

<!-- DISCOUNT -->
<h5>Discount Calculation</h5>
<p> Maintenance: <b>₹${Math.round(r.maintenance)}</b></p>
${isRented ? "<p> Rented Property Additional: <b>₹ " + Math.round(r.additional) + "</b></p>" : ``}
<p>
Eligible Amount: <b>₹${Math.round(eligible)}</b>
${isRented ? "(Includes Maintenance + Additional for rented property)" : ""}
</p>
<p>5% Discount: <b>₹${discount}</b></p>



<hr>

<!-- TOTAL -->
<h5>Total Payable Summary</h5>

<p>
Maintenance (After Discount): 
<b>₹${Math.round(eligible - discount)}</b>
</p>
<p> Previous Balance: <b>₹${r.previous}</b></p> 
<p> Sinking Fund: <b>₹${r.sinking}</b></p>   
${r.conveyance > 0 ? `
<p>
Conveyance Deed Charges (One-time): 
<b>₹${r.conveyance}</b>
</p>
` : ``}

<p class="highlight">
Grand Total Payable: ₹${Math.round(r.discounted)}
</p>

<hr>

<!-- PAYMENT METHODS -->
<h5>Payment Methods</h5>

<p>
<b>Cheque:</b><br>
Alacrity Co-operative Housing Society Ltd.<br>
Submit to Achyut Oak<br>
9:30 AM – 6:30 PM (Except Wednesday)<br>
Phone: 8208146541
</p>

<p>
<b>NEFT / Online Transfer:</b><br>
Account No: 9310000100008523<br>
Bank: Punjab National Bank<br>
IFSC: PUNB0931000
</p>

<p>
Email proof to:<br>
alacrityhsgsociety@gmail.com<br>
alacritymanager94@gmail.com
</p>

<hr>


<br>

<p>With Regards,<br><b>Alacrity Committee</b></p>

</div>
`;
}
</script>
</body>
</html>
